# Pinned to 1.92 — the only toolchain installed on the build hosts (matches
# rust/imzero2). `stable` is intentionally NOT used: it is not installed here and
# would force a network download. With no global rustup default configured, this
# file is what lets a bare `cargo` invocation resolve a toolchain inside the crate.
[toolchain]
channel = "1.92"
components = ["rustfmt", "clippy"]
