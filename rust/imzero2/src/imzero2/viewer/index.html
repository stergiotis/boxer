<!DOCTYPE html>
<!--
  imzero2 remote viewer (ADR-0024 Phase 4, v1).

  Single-file page embedded into the headless host binary and served on
  the carrier's page port. Speaks the boxer.imzero2.v1 wire (one binary
  WebSocket, one-byte type prefix): decodes VideoChunk envelopes with a
  hand-written minimal protobuf reader, feeds H.264 access units (Annex-B,
  in-band SPS/PPS) to a WebCodecs VideoDecoder, draws to a canvas, and
  returns DOM input as protobuf InputEvent messages via a matching
  minimal writer.

  The hand-written codec mirrors proto/boxer/imzero2/v1/input.proto and
  must track it; replacing this page's codec with protobuf-es codegen is
  the named follow-up (ADR-0024 SD7).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Real device viewport (without this, mobile Safari lays out a ~980px
     virtual viewport and our measured resize reports nonsense) and no
     page pinch-zoom — pinch belongs to the app (PinchZoom event). -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>imzero2 remote viewer</title>
<style>
  html, body { margin: 0; background: #101010; color: #9a9a9a;
               font: 12px monospace; height: 100%;
               /* The canvas IS the whole UI — the page must never scroll.
                  Without this, a sub-pixel canvas overshoot spawns a
                  scrollbar, whose gutter inflates window.inner{Width,Height}
                  on the next measure, which grows the canvas further: a
                  feedback loop that leaves BOTH bars stuck (seen in Edge on
                  Windows, where the gutter is ~17 px — the "off by tens of
                  pixels" the surface measurement appeared to have). */
               overflow: hidden;
               overscroll-behavior: none; }
  #status { padding: 4px 8px; }
  #cadence { color: #6a9fb5; text-decoration: none; }
  #role { font-weight: bold; }
  #takeBtn { font: inherit; background: #2a3a44; color: #cfe3ee; border: 1px solid #3d5562;
             border-radius: 3px; padding: 1px 8px; margin: 0 2px; cursor: pointer; display: none; }
  #takeBtn:hover { background: #36505e; }
  #roster { color: #7a7a7a; }
  /* Off-screen focusable trap so a Ctrl/Cmd+V paste fires a `paste` event with
     clipboardData even though the canvas itself is not editable (Firefox will
     not fire paste on a focused non-editable element). */
  #pasteTrap { position: fixed; left: -9999px; top: 0; width: 1px; height: 1px; opacity: 0; }
  /* touch-action: none hands every touch to our pointer handlers instead
     of native scrolling — without it, mobile browsers cancel pointer
     events mid-drag to scroll the page, which is what broken gestures
     look like. The -webkit bits kill iOS long-press callouts/selection. */
  #screen { display: block; margin: 0 auto; outline: none;
            touch-action: none;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none; }
</style>
</head>
<body>
<div id="status"><span id="statusmsg">connecting…</span> · <a id="cadence" href="#" title="toggle render cadence (host-wide)"></a> · <span id="role"></span><button id="takeBtn" type="button" title="take control of this session">Take session</button> · <span id="roster"></span></div>
<canvas id="screen" tabindex="0"></canvas>
<textarea id="pasteTrap" aria-hidden="true" tabindex="-1"></textarea>
<script>
"use strict";

const PREFIX_VIDEO = 0x01, PREFIX_INPUT = 0x02, PREFIX_SESSION = 0x03;

// The serving port accepts WebSocket upgrades too, so the data channel is
// same-origin by default — which keeps one TLS-terminating reverse proxy
// or SSH tunnel sufficient for the whole wire (wss follows https). A
// `?ws=` query parameter overrides the endpoint for unusual deployments.
const WS_URL = new URLSearchParams(location.search).get("ws")
  || `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;

const statusBar = document.getElementById("status");
const statusEl = document.getElementById("statusmsg");
const cadenceEl = document.getElementById("cadence");
const roleEl = document.getElementById("role");
const takeBtn = document.getElementById("takeBtn");
const rosterEl = document.getElementById("roster");
const pasteTrap = document.getElementById("pasteTrap");
const canvas = document.getElementById("screen");
const ctx2d = canvas.getContext("2d");

// Optional device label shown in everyone's roster ("?label=iPad").
const LABEL = new URLSearchParams(location.search).get("label") || "";

// Server-authoritative session role (ADR-0086): the viewer never self-assigns
// active — it mirrors the roster's `you_role`. Input is gated on this (SD3),
// so a freshly-connected viewer sends no input until the first roster confirms
// it is active. All of this is updated in applyRoster().
let myId = 0n, myRole = "passive", activeId = 0n, rosterConns = [], rosterMax = 0;

// 0 = continuous, 1 = reactive; truth arrives with the hello, toggled
// optimistically on click (host scope, not per session).
let cadence = 0;
function renderCadence() {
  cadenceEl.textContent = cadence === 1 ? "cadence: reactive" : "cadence: continuous";
}
cadenceEl.addEventListener("click", (e) => {
  e.preventDefault();
  // Cadence is host-scoped but honoured only from the active connection
  // (ADR-0086 SD2); a passive viewer's toggle would be dropped, so ignore it.
  if (myRole !== "active") return;
  cadence = cadence === 1 ? 0 : 1;
  sendSetCadence(cadence);
  renderCadence();
});
renderCadence();

// Take control of the session (ADR-0086 SD2): promotes us to active and
// demotes the prior active. Unilateral (one principal) — no approval prompt.
takeBtn.addEventListener("click", () => sendTakeSession());

// ---- minimal protobuf reader (proto3 subset used by the wire) ----
class Reader {
  constructor(bytes) { this.b = bytes; this.i = 0; }
  eof() { return this.i >= this.b.length; }
  varint() {
    let r = 0n, s = 0n;
    for (;;) {
      const byte = this.b[this.i++];
      r |= BigInt(byte & 0x7f) << s;
      if ((byte & 0x80) === 0) return r;
      s += 7n;
    }
  }
  tag() { const v = Number(this.varint()); return [v >>> 3, v & 7]; }
  float() {
    const v = new DataView(this.b.buffer, this.b.byteOffset + this.i, 4).getFloat32(0, true);
    this.i += 4; return v;
  }
  bytes() { const n = Number(this.varint()); const v = this.b.subarray(this.i, this.i + n); this.i += n; return v; }
  skip(wire) {
    if (wire === 0) this.varint();
    else if (wire === 1) this.i += 8;
    else if (wire === 2) this.bytes();
    else if (wire === 5) this.i += 4;
    else throw new Error("wire " + wire);
  }
}

// SessionControl oneof (input.proto): hello=1, viewport_resize=2, ping=3,
// set_cadence=4, decode_capabilities=5, client_hello=6, roster=7,
// take_session=8, clipboard=9. The viewer receives hello, roster and clipboard.
function parseSessionControl(bytes) {
  const r = new Reader(bytes);
  while (!r.eof()) {
    const [field, wire] = r.tag();
    if (wire === 2) {
      const sub = r.bytes();
      if (field === 1) return { kind: "hello", hello: parseHelloBody(sub) };
      if (field === 7) return { kind: "roster", roster: parseRosterBody(sub) };
      if (field === 9) return { kind: "clipboard", text: parseClipboardBody(sub) };
    } else {
      r.skip(wire);
    }
  }
  return null;
}
function parseHelloBody(bytes) { // SessionHello
  const h = new Reader(bytes);
  const out = { width: 0, height: 0, ppp: 1.0, cadence: 0, codec: "" };
  while (!h.eof()) {
    const [f, w] = h.tag();
    if (f === 1 && w === 0) out.width = Number(h.varint());
    else if (f === 2 && w === 0) out.height = Number(h.varint());
    else if (f === 3 && w === 5) out.ppp = h.float();
    else if (f === 4 && w === 0) out.cadence = Number(h.varint());
    else if (f === 5 && w === 2) out.codec = new TextDecoder().decode(h.bytes());
    else h.skip(w);
  }
  return out;
}
function parseRosterBody(bytes) { // Roster{ you_id, you_role, active_id, count, max, connections[] }
  const r = new Reader(bytes);
  const out = { youId: 0n, youRole: 0, activeId: 0n, count: 0, max: 0, connections: [] };
  while (!r.eof()) {
    const [f, w] = r.tag();
    if (f === 1 && w === 0) out.youId = r.varint();
    else if (f === 2 && w === 0) out.youRole = Number(r.varint());
    else if (f === 3 && w === 0) out.activeId = r.varint();
    else if (f === 4 && w === 0) out.count = Number(r.varint());
    else if (f === 5 && w === 0) out.max = Number(r.varint());
    else if (f === 6 && w === 2) out.connections.push(parseRosterEntry(r.bytes()));
    else r.skip(w);
  }
  return out;
}
function parseRosterEntry(bytes) { // RosterEntry{ id, role, label, webcodecs }
  const r = new Reader(bytes);
  const e = { id: 0n, role: 0, label: "", webcodecs: false };
  while (!r.eof()) {
    const [f, w] = r.tag();
    if (f === 1 && w === 0) e.id = r.varint();
    else if (f === 2 && w === 0) e.role = Number(r.varint());
    else if (f === 3 && w === 2) e.label = new TextDecoder().decode(r.bytes());
    else if (f === 4 && w === 0) e.webcodecs = r.varint() !== 0n;
    else r.skip(w);
  }
  return e;
}
function parseClipboardBody(bytes) { // ClipboardData{ text }
  const r = new Reader(bytes);
  let text = "";
  while (!r.eof()) {
    const [f, w] = r.tag();
    if (f === 1 && w === 2) text = new TextDecoder().decode(r.bytes());
    else r.skip(w);
  }
  return text;
}

function parseVideoChunk(bytes) {
  const r = new Reader(bytes);
  const out = { frameIndex: 0n, timestampMicros: 0n, keyframe: false, data: null };
  while (!r.eof()) {
    const [f, w] = r.tag();
    if (f === 1 && w === 0) out.frameIndex = r.varint();
    else if (f === 2 && w === 0) out.timestampMicros = r.varint();
    else if (f === 3 && w === 0) out.keyframe = r.varint() !== 0n;
    else if (f === 4 && w === 2) out.data = r.bytes();
    else r.skip(w);
  }
  return out;
}

// ---- minimal protobuf writer ----
class Writer {
  constructor() { this.out = []; }
  varint(v) { v = Number(v) >>> 0; for (;;) { if (v < 0x80) { this.out.push(v); return this; } this.out.push((v & 0x7f) | 0x80); v >>>= 7; } }
  tag(field, wire) { return this.varint((field << 3) | wire); }
  float(field, v) { this.tag(field, 5); const b = new Uint8Array(4); new DataView(b.buffer).setFloat32(0, v, true); this.out.push(...b); return this; }
  uint(field, v) { if (v) { this.tag(field, 0).varint(v); } return this; }
  bool(field, v) { if (v) { this.tag(field, 0).varint(1); } return this; }
  str(field, s) { if (s) { const b = new TextEncoder().encode(s); this.tag(field, 2).varint(b.length); this.out.push(...b); } return this; }
  sub(field, inner) { this.tag(field, 2).varint(inner.out.length); this.out.push(...inner.out); return this; }
  bytes() { return new Uint8Array(this.out); }
}

function sendFramed(prefix, writer) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  // Input is honoured only from the active connection (ADR-0086 SD2/SD3); a
  // passive viewer must not even emit it. The server drops it too (defence in
  // depth), but gating here is the anti-race point: no input until the roster
  // confirms us active.
  if (prefix === PREFIX_INPUT && myRole !== "active") return;
  const body = writer.bytes();
  const framed = new Uint8Array(1 + body.length);
  framed[0] = prefix;
  framed.set(body, 1);
  ws.send(framed);
}

// InputEvent oneof field numbers (input.proto): mouse_move=1,
// mouse_button=2, mouse_wheel=3, key=4, text=5, pointer_gone=6.
function sendMouseMove(x, y) { sendFramed(PREFIX_INPUT, new Writer().sub(1, new Writer().float(1, x).float(2, y))); }
function sendMouseButton(x, y, button, pressed, mods) {
  sendFramed(PREFIX_INPUT, new Writer().sub(2, new Writer().float(1, x).float(2, y).uint(3, button).bool(4, pressed).uint(5, mods)));
}
function sendMouseWheel(dx, dy, unit, mods) {
  sendFramed(PREFIX_INPUT, new Writer().sub(3, new Writer().float(1, dx).float(2, dy).uint(3, unit).uint(4, mods)));
}
function sendKey(key, code, pressed, repeat, mods) {
  sendFramed(PREFIX_INPUT, new Writer().sub(4, new Writer().str(1, key).str(2, code).bool(3, pressed).bool(4, repeat).uint(5, mods)));
}
function sendText(text) { sendFramed(PREFIX_INPUT, new Writer().sub(5, new Writer().str(1, text))); }
function sendPointerGone() { sendFramed(PREFIX_INPUT, new Writer().sub(6, new Writer())); }
function sendPinchZoom(factor) { sendFramed(PREFIX_INPUT, new Writer().sub(7, new Writer().float(1, factor))); }
// Runtime render-cadence switch: 0 = continuous, 1 = reactive. Host
// scope (survives reconnects). Full idle savings need a server launched
// with IMZERO2_RENDER_CADENCE=reactive — see the .proto note.
function sendSetCadence(mode) { sendFramed(PREFIX_SESSION, new Writer().sub(4, new Writer().uint(1, mode))); }
function sendResize(lw, lh, scale) {
  sendFramed(PREFIX_SESSION, new Writer().sub(2, new Writer().float(1, lw).float(2, lh).float(3, scale)));
}
// Decode-progress attestation: the server logs pings, which makes
// "frames are actually being decoded in this browser" observable from
// the server side (useful for headless verification and field debugging).
function sendPing(nonce) {
  sendFramed(PREFIX_SESSION, new Writer().sub(3, new Writer().uint(1, nonce)));
}
// ADR-0086 SD8: announce our capabilities + label just after connect.
// client_hello = 6 (SessionControl); ClientHello{ webcodecs=1, label=2 }.
function sendClientHello(webcodecs, label) {
  sendFramed(PREFIX_SESSION, new Writer().sub(6, new Writer().bool(1, webcodecs).str(2, label)));
}
// Request to become the active connection. take_session = 8; empty message.
function sendTakeSession() {
  sendFramed(PREFIX_SESSION, new Writer().sub(8, new Writer()));
}
// ADR-0082 SD6 clipboard (client→server = a paste to inject). clipboard = 9;
// ClipboardData{ text=1 }. The server keeps it only from the active session.
function sendClipboard(text) {
  if (myRole !== "active") return;
  sendFramed(PREFIX_SESSION, new Writer().sub(9, new Writer().str(1, text)));
}

// Client→server decode capabilities (ADR-0088 SD2/SD8). For each codec the
// host can offer, probe a representative WebCodecs string at the current
// geometry via VideoDecoder.isConfigSupported (authoritative for the path
// we use) plus navigator.mediaCapabilities.decodingInfo (the smooth /
// power-efficient hints). The host forwards these to the Go interpreter.
// Codec level scales with resolution: WebCodecs validates the codec-string
// level against the coded size, so the probe must use the level the host will
// actually stream at this geometry — otherwise a high-res VP9/AV1 is wrongly
// probed as unsupported and the Go control hides a codec that in fact works.
// These tables mirror the Rust host (codeclane.rs) and the Go model
// (videopipeline.go) — keep the three in sync.
function vp9Level(w, h) {
  const s = w * h;
  return s <= 36864 ? "10" : s <= 73728 ? "11" : s <= 122880 ? "20"
    : s <= 245760 ? "21" : s <= 552960 ? "30" : s <= 983040 ? "31"
    : s <= 2228224 ? "40" : s <= 8912896 ? "50" : s <= 35651584 ? "60" : "61";
}
function av1Level(w, h) {
  const s = w * h;
  return s <= 147456 ? "00" : s <= 278784 ? "01" : s <= 665856 ? "04"
    : s <= 1065024 ? "05" : s <= 2359296 ? "08" : s <= 8912896 ? "12" : "16";
}
function h264Level(w, h) {
  const mbs = Math.ceil(w / 16) * Math.ceil(h / 16);
  return mbs <= 1620 ? "1e" : mbs <= 3600 ? "1f" : mbs <= 5120 ? "20"
    : mbs <= 8192 ? "28" : mbs <= 8704 ? "2a" : mbs <= 22080 ? "32"
    : mbs <= 36864 ? "33" : "3c";
}
function capCandidates(w, h) {
  const avc = "avc1.42E0" + h264Level(w, h);
  const vp9 = "vp09.00." + vp9Level(w, h) + ".08";
  const av1 = "av01.0." + av1Level(w, h) + "M.08";
  // AV1 High profile (4:4:4): profile 1, chroma 000, plus the full color
  // description (BT.709/sRGB/BT.709/full) — required for isConfigSupported to
  // report it; browsers reject the truncated av01.1…000 form.
  const av1_444 = "av01.1." + av1Level(w, h) + "M.08.0.000.01.13.01.1";
  return [
    { codec: avc, contentType: 'video/mp4; codecs="' + avc + '"' },
    { codec: vp9, contentType: 'video/webm; codecs="' + vp9 + '"' },
    { codec: av1, contentType: 'video/mp4; codecs="' + av1 + '"' },
    { codec: av1_444, contentType: 'video/mp4; codecs="' + av1_444 + '"' },
  ];
}
async function probeAndSendCapabilities() {
  if (!hello) return;
  const w = hello.width || 1280, h = hello.height || 720, fps = 30;
  const caps = [];
  for (const cand of capCandidates(w, h)) {
    let supported = false, smooth = false, powerEfficient = false;
    try {
      if (window.VideoDecoder && VideoDecoder.isConfigSupported) {
        const r = await VideoDecoder.isConfigSupported({ codec: cand.codec, codedWidth: w, codedHeight: h });
        supported = !!(r && r.supported);
      }
    } catch (_) {}
    try {
      if (navigator.mediaCapabilities && navigator.mediaCapabilities.decodingInfo) {
        const info = await navigator.mediaCapabilities.decodingInfo({
          type: "media-source",
          video: { contentType: cand.contentType, width: w, height: h, bitrate: 4000000, framerate: fps },
        });
        if (info) { supported = supported || !!info.supported; smooth = !!info.smooth; powerEfficient = !!info.powerEfficient; }
      }
    } catch (_) {}
    caps.push({ codec: cand.codec, supported, smooth, powerEfficient });
  }
  sendDecodeCapabilities(caps);
}
function sendDecodeCapabilities(caps) {
  const dc = new Writer(); // DecodeCapabilities { repeated CodecCapability codecs = 1 }
  for (const c of caps) {
    dc.sub(1, new Writer().str(1, c.codec).bool(2, c.supported).bool(3, c.smooth).bool(4, c.powerEfficient));
  }
  sendFramed(PREFIX_SESSION, new Writer().sub(5, dc)); // SessionControl.decode_capabilities = 5
}

// ---- video pipeline ----
let ws = null, hello = null, decoder = null, configured = false;
let framesDecoded = 0, lastStatus = 0, inputSetup = false, cadenceParamApplied = false;

function findSps(au) { // Annex-B scan for NAL type 7
  for (let i = 0; i + 3 < au.length; i++) {
    if (au[i] === 0 && au[i + 1] === 0 && au[i + 2] === 1) {
      if ((au[i + 3] & 0x1f) === 7) return i + 3;
      i += 2;
    }
  }
  return -1;
}

function codecStringFromSps(au, idx) {
  // profile_idc, constraint flags, level_idc are the three bytes after
  // the NAL header byte.
  const hex = (b) => b.toString(16).padStart(2, "0");
  return "avc1." + hex(au[idx + 1]) + hex(au[idx + 2]) + hex(au[idx + 3]);
}

function setupDecoder(codec) {
  if (decoder) { try { decoder.close(); } catch (_) {} decoder = null; }
  decoder = new VideoDecoder({
    output(frame) {
      framesDecoded++;
      ctx2d.drawImage(frame, 0, 0);
      frame.close();
      if (framesDecoded === 1 || framesDecoded % 5 === 0) sendPing(framesDecoded);
      const now = performance.now();
      if (now - lastStatus > 1000) {
        lastStatus = now;
        statusEl.textContent = `connected — ${hello.width}×${hello.height} @ppp ${hello.ppp} — ${framesDecoded} frames decoded`;
      }
    },
    error(e) {
      // The stream runs an effectively infinite GOP (key frame only at
      // encoder start), so recovery = reconnect: the server starts a
      // fresh encoder (SPS/PPS + IDR) for every connection.
      statusEl.textContent = "decoder error: " + e.message + " — reconnecting";
      try { ws.close(); } catch (_) {}
    },
  });
  decoder.configure({ codec, optimizeForLatency: true });
  configured = true;
}

function onVideo(payload) {
  const chunk = parseVideoChunk(payload);
  if (!chunk.data) return;
  if (!configured) {
    if (!chunk.keyframe) return; // cannot join mid-GOP
    // The host names VP9/AV1 (and may name H.264) in the hello; otherwise
    // H.264 self-describes via its in-band SPS.
    let codec = hello && hello.codec ? hello.codec : null;
    if (!codec) {
      const spsIdx = findSps(chunk.data);
      if (spsIdx < 0) return;
      codec = codecStringFromSps(chunk.data, spsIdx);
    }
    setupDecoder(codec);
  }
  // configure() gets no `description`: H.264 Annex-B (in-band SPS/PPS) and
  // VP9/AV1 (native frames) both pass through unmodified.
  decoder.decode(new EncodedVideoChunk({
    type: chunk.keyframe ? "key" : "delta",
    timestamp: Number(chunk.timestampMicros),
    data: chunk.data,
  }));
}

// ---- input capture ----
function mods(e) {
  let m = 0;
  if (e.altKey) m |= 1;
  if (e.ctrlKey) m |= 2 | 16; // egui command = ctrl on linux/windows
  if (e.shiftKey) m |= 4;
  if (e.metaKey) m |= 8 | 16;
  return m;
}

function logicalPos(e) {
  const rect = canvas.getBoundingClientRect();
  const lw = hello.width / hello.ppp, lh = hello.height / hello.ppp;
  return [
    (e.clientX - rect.left) * lw / rect.width,
    (e.clientY - rect.top) * lh / rect.height,
  ];
}

let pendingMove = null;
function flushMove() {
  if (pendingMove) { sendMouseMove(pendingMove[0], pendingMove[1]); pendingMove = null; }
  requestAnimationFrame(flushMove);
}

// ---- viewport reporting ----
// Report the browser viewport (CSS px) and pixel scale (devicePixelRatio
// × page zoom); the host rebuilds its render target + encoder at the new
// geometry and answers with a fresh SessionHello. Guarded against echo
// loops: a hello caused by our own report doesn't re-send unless the
// window actually changed meanwhile.
let lastSentGeometry = null;
function measureAndSend() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  // Only the active connection owns geometry (ADR-0086 SD2/SD6); a passive
  // viewer is pinned to the active's stream size and reports nothing. On
  // promotion, applyRoster clears the echo guard and calls this.
  if (myRole !== "active") return;
  const scale = window.devicePixelRatio || 1;
  // documentElement.client{Width,Height} exclude the scrollbar gutter;
  // window.inner{Width,Height} include it. With overflow:hidden no gutter
  // exists, so they normally agree — but measuring the content box directly
  // is the correct, gutter-proof source and also yields integer CSS px (no
  // fractional offsetHeight rounding feeding back into the geometry).
  const doc = document.documentElement;
  const lw = Math.max(320, doc.clientWidth);
  const lh = Math.max(240, doc.clientHeight - statusBar.offsetHeight);
  if (lastSentGeometry &&
      Math.abs(lastSentGeometry[0] - lw) < 1 &&
      Math.abs(lastSentGeometry[1] - lh) < 1 &&
      Math.abs(lastSentGeometry[2] - scale) < 0.01) return;
  lastSentGeometry = [lw, lh, scale];
  sendResize(lw, lh, scale);
}
let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(measureAndSend, 300); // debounce drag-resizing
});

// ---- touch gesture layer ----
// One finger forwards as the pointer (tap = click, drag = pointer drag —
// egui's drag-to-scroll picks that up in scroll areas). Two fingers stop
// being a pointer and become trackpad-style gestures: centroid movement →
// MouseWheel (natural direction: content follows the fingers), distance
// ratio → PinchZoom. Mouse/pen input bypasses all of this.
const touchPoints = new Map(); // pointerId -> [x, y] (logical)
let touchDownSent = false;     // a button-press was forwarded for the 1-finger gesture
let lastCentroid = null, lastSpread = null;

function centroidAndSpread() {
  const pts = [...touchPoints.values()];
  const [a, b] = pts;
  const c = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  return [c, Math.hypot(a[0] - b[0], a[1] - b[1])];
}

function touchDown(e, pos) {
  touchPoints.set(e.pointerId, pos);
  if (touchPoints.size === 1) {
    touchDownSent = true;
    sendMouseMove(pos[0], pos[1]);
    sendMouseButton(pos[0], pos[1], 0, true, 0);
  } else if (touchPoints.size === 2) {
    // Entering two-finger mode: release the forwarded press so egui
    // doesn't keep dragging, then track gestures.
    if (touchDownSent) { sendMouseButton(pos[0], pos[1], 0, false, 0); touchDownSent = false; }
    sendPointerGone();
    [lastCentroid, lastSpread] = centroidAndSpread();
  } // 3+ fingers: ignored
}

function touchMove(e, pos) {
  if (!touchPoints.has(e.pointerId)) return;
  touchPoints.set(e.pointerId, pos);
  if (touchPoints.size === 1) {
    pendingMove = pos;
  } else if (touchPoints.size === 2) {
    const [c, spread] = centroidAndSpread();
    const dx = c[0] - lastCentroid[0], dy = c[1] - lastCentroid[1];
    if (dx !== 0 || dy !== 0) sendMouseWheel(dx, dy, 0, 0);
    const factor = spread / lastSpread;
    if (isFinite(factor) && factor > 0 && Math.abs(factor - 1) > 0.004) sendPinchZoom(factor);
    [lastCentroid, lastSpread] = [c, spread];
  }
}

function touchEnd(e, pos) {
  if (!touchPoints.has(e.pointerId)) return;
  touchPoints.delete(e.pointerId);
  if (touchDownSent && touchPoints.size === 0) {
    touchDownSent = false;
    sendMouseButton(pos[0], pos[1], 0, false, 0);
    sendPointerGone(); // no hover on touch
  }
  lastCentroid = null;
  lastSpread = null;
  if (touchPoints.size === 2) [lastCentroid, lastSpread] = centroidAndSpread();
}

function setupInput() {
  canvas.addEventListener("pointermove", (e) => {
    if (e.pointerType === "touch") { touchMove(e, logicalPos(e)); e.preventDefault(); return; }
    pendingMove = logicalPos(e);
  });
  canvas.addEventListener("pointerdown", (e) => {
    canvas.focus();
    canvas.setPointerCapture(e.pointerId);
    if (e.pointerType === "touch") { touchDown(e, logicalPos(e)); e.preventDefault(); return; }
    const [x, y] = logicalPos(e);
    sendMouseButton(x, y, e.button, true, mods(e));
    e.preventDefault();
  });
  const upOrCancel = (e) => {
    if (e.pointerType === "touch") { touchEnd(e, logicalPos(e)); e.preventDefault(); return; }
    const [x, y] = logicalPos(e);
    sendMouseButton(x, y, e.button, false, mods(e));
    e.preventDefault();
  };
  canvas.addEventListener("pointerup", upOrCancel);
  canvas.addEventListener("pointercancel", upOrCancel);
  canvas.addEventListener("pointerleave", (e) => {
    if (e.pointerType === "touch") return; // handled by up/cancel
    sendPointerGone();
  });
  canvas.addEventListener("contextmenu", (e) => e.preventDefault());
  canvas.addEventListener("wheel", (e) => {
    // deltaMode: 0=pixel (≈ logical points at ppp mapping), 1=line, 2=page.
    const unit = e.deltaMode === 1 ? 1 : e.deltaMode === 2 ? 2 : 0;
    sendMouseWheel(-e.deltaX, -e.deltaY, unit, mods(e));
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener("keydown", (e) => {
    sendKey(e.key, e.code, true, e.repeat, mods(e));
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) sendText(e.key);
    // Paste shortcut (Ctrl/Cmd+V): hand the browser's paste to the off-screen
    // trap so the `paste` event fires reliably (Firefox won't fire it on the
    // non-editable canvas). Let the default proceed so the paste happens; a
    // safety timer hands focus back if the paste never lands (empty clipboard).
    if ((e.ctrlKey || e.metaKey) && (e.key === "v" || e.key === "V")) {
      if (myRole === "active") {
        pasteTrap.value = "";
        pasteTrap.focus();
        setTimeout(() => { if (document.activeElement === pasteTrap) canvas.focus(); }, 50);
      }
      return;
    }
    if (!(e.key === "F5" || e.key === "F11" || e.key === "F12")) e.preventDefault();
  });
  canvas.addEventListener("keyup", (e) => {
    sendKey(e.key, e.code, false, false, mods(e));
    e.preventDefault();
  });
  // Clipboard paste (ADR-0082 SD6), active-only (gated in sendClipboard) → the
  // host injects it as egui's Paste event. The trap catches the keyboard paste
  // and stops propagation so the document fallback (context-menu paste) does
  // not double-send it.
  pasteTrap.addEventListener("paste", (e) => {
    const t = (e.clipboardData || window.clipboardData).getData("text");
    if (t) sendClipboard(t);
    e.preventDefault();
    e.stopPropagation();
    setTimeout(() => canvas.focus(), 0);
  });
  document.addEventListener("paste", (e) => {
    const t = (e.clipboardData || window.clipboardData).getData("text");
    if (t) sendClipboard(t);
    e.preventDefault();
  });
  // Flush a host→viewer clipboard write that writeText deferred for lack of a
  // user activation (Firefox); any interaction supplies one (capture phase so
  // it runs before the per-widget handlers).
  document.addEventListener("pointerdown", flushClipboardWrite, true);
  document.addEventListener("keydown", flushClipboardWrite, true);
  requestAnimationFrame(flushMove);
}

// ---- connection ----
let reconnectDelay = 1000;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => {
    reconnectDelay = 1000;
    statusEl.textContent = "connected — waiting for stream";
    // Announce capabilities + label (ADR-0086 SD8). WebCodecs is implied — the
    // page only connects when VideoDecoder exists (see the bottom guard).
    sendClientHello(true, LABEL);
  };
  ws.onclose = () => {
    statusEl.textContent = "disconnected — reconnecting…";
    configured = false;
    if (decoder) { try { decoder.close(); } catch (_) {} decoder = null; }
    // A restarted server forgets the applied geometry; clear the echo
    // guard so the post-reconnect hello triggers a fresh viewport report.
    lastSentGeometry = null;
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 5000);
  };
  ws.onerror = () => { /* onclose follows and handles retry */ };
  ws.onmessage = (e) => {
    const data = new Uint8Array(e.data);
    if (data.length < 1) return;
    const payload = data.subarray(1);
    if (data[0] === PREFIX_VIDEO) onVideo(payload);
    else if (data[0] === PREFIX_SESSION) {
      const ctl = parseSessionControl(payload);
      if (!ctl) return;
      if (ctl.kind === "hello") onHello(ctl.hello);
      else if (ctl.kind === "roster") applyRoster(ctl.roster);
      else if (ctl.kind === "clipboard") onClipboard(ctl.text);
    }
  };
}

function onHello(h) {
  const changed = !hello || hello.width !== h.width || hello.height !== h.height || hello.ppp !== h.ppp || hello.codec !== h.codec;
  hello = h;
  if (changed) {
    canvas.width = h.width;
    canvas.height = h.height;
    canvas.style.width = (h.width / h.ppp) + "px";
    canvas.style.height = (h.height / h.ppp) + "px";
    // New geometry means a fresh stream (SPS/PPS + IDR) follows;
    // drop the decoder and rejoin at the keyframe, same as connect.
    if (decoder) { try { decoder.close(); } catch (_) {} decoder = null; }
    configured = false;
    probeAndSendCapabilities(); // (re)probe at the new geometry (ADR-0088 SD8)
  }
  cadence = h.cadence;
  renderCadence();
  if (!inputSetup) { inputSetup = true; setupInput(); canvas.focus(); }
  // ?cadence=reactive|continuous applies once per page load.
  if (!cadenceParamApplied) {
    cadenceParamApplied = true;
    const want = new URLSearchParams(location.search).get("cadence");
    const mode = want === "reactive" || want === "1" ? 1 : want === "continuous" || want === "0" ? 0 : null;
    if (mode !== null && mode !== cadence) {
      cadence = mode;
      sendSetCadence(mode);
      renderCadence();
    }
  }
  measureAndSend(); // gated on active — a passive viewer is pinned to the active's geometry
}

// Mirror the server-authoritative roster into the viewer ViewMode (ADR-0086
// SD3). The role drives input gating (in sendFramed) and, on promotion, a
// fresh viewport report so the host rebuilds the shared stream to this device.
function applyRoster(roster) {
  const wasActive = myRole === "active";
  myId = roster.youId;
  myRole = roster.youRole === 1 ? "active" : "passive";
  activeId = roster.activeId;
  rosterConns = roster.connections;
  rosterMax = roster.max;
  renderRoster();
  if (myRole === "active" && !wasActive) {
    // Promoted: take ownership of geometry/cadence — report our viewport so
    // the host rebuilds the stream to us if it differs (SD5). Clear the echo
    // guard so the report is not suppressed.
    lastSentGeometry = null;
    measureAndSend();
  }
  // Demotion needs no teardown: input/resize/cadence are gated by myRole.
}

function renderRoster() {
  const active = myRole === "active";
  roleEl.textContent = active ? "ACTIVE — you drive" : "passive — view only";
  roleEl.style.color = active ? "#9ccc65" : "#b58a6a";
  // Offer "Take session" only while passive (a WebCodecs-capable viewer; this
  // page requires WebCodecs to connect at all, so the capability is implied).
  takeBtn.style.display = active ? "none" : "";
  const parts = rosterConns.map((c) => {
    const you = c.id === myId ? "▸" : "";
    const name = c.label || ("#" + c.id);
    const tag = c.role === 1 ? "active" : "passive";
    return `${you}${name}[${tag}]`;
  });
  rosterEl.textContent = rosterConns.length
    ? `viewers ${rosterConns.length}/${rosterMax}: ${parts.join("  ")}`
    : "";
}

// Host→viewer clipboard (ADR-0082 SD6): the remote app copied text; write it to
// the local clipboard. navigator.clipboard.writeText needs a secure context
// (loopback qualifies) AND — in Firefox, and Chrome when the tab is unfocused —
// a transient user activation, which a host-initiated copy lacks. So we attempt
// it immediately and, on rejection, keep the text pending and retry on the next
// user gesture (the capture-phase listeners in setupInput).
let pendingClipboardWrite = null;
function onClipboard(text) {
  if (!text) return;
  pendingClipboardWrite = text;
  flushClipboardWrite();
}
function flushClipboardWrite() {
  if (pendingClipboardWrite === null) return;
  if (!(navigator.clipboard && navigator.clipboard.writeText)) { pendingClipboardWrite = null; return; }
  const text = pendingClipboardWrite;
  navigator.clipboard.writeText(text)
    .then(() => { if (pendingClipboardWrite === text) pendingClipboardWrite = null; })
    .catch(() => { /* no user activation yet — a later gesture retries this */ });
}

if (!("VideoDecoder" in window)) {
  statusEl.textContent = "WebCodecs is not available in this browser (need Chromium, Safari 16.4+, or Firefox 130+)";
} else {
  connect();
}
</script>
</body>
</html>
