// ADR-0024 SD7: input events and session control for the imzero2
// remote-access wire. This file is the canonical contract; the namespace
// `boxer/imzero2/v1` was fixed at the ADR's acceptance (2026-06-12).
// Versioning policy per the ADR's Derived practices: additions are
// additive (new fields, new oneof variants) until a v2 is unavoidable.
//
// Codegen status: the Rust side is generated from this file at build
// time (rust/imzero2/build.rs, protox + prost-build, pure Rust — no
// system protoc), so it cannot drift from the contract. The v1 browser
// viewer still hand-encodes/decodes the messages it uses (a deliberate
// choice — protobuf-es would add a bundling step to the self-contained
// single-file viewer); keep that hand codec in sync by hand.
//
// Wire framing (ADR-0024 SD6): a single WebSocket carries everything as
// binary messages with a one-byte type prefix:
//   0x01 server→client  VideoChunk     (encoded H.264 access unit; broadcast
//                                        to every connection, ADR-0086)
//   0x02 client→server  InputEvent     (honoured only from the active
//                                        connection, ADR-0086 SD2)
//   0x03 both ways      SessionControl (hello, resize, ping, set-cadence,
//                                        decode-caps, client-hello, roster,
//                                        take-session, clipboard)

syntax = "proto3";

package boxer.imzero2.v1;

// Modifier bitmask, mirroring egui::Modifiers: 1=alt, 2=ctrl, 4=shift,
// 8=mac_cmd, 16=command.

message InputEvent {
  oneof event {
    MouseMove mouse_move = 1;
    MouseButton mouse_button = 2;
    MouseWheel mouse_wheel = 3;
    KeyEvent key = 4;
    TextInput text = 5;
    PointerGone pointer_gone = 6;
    PinchZoom pinch_zoom = 7;
  }
}

// Coordinates are in logical points (the egui coordinate space of the
// stream); the viewer converts from CSS pixels using the SessionHello
// geometry.
message MouseMove {
  float x = 1;
  float y = 2;
}

message MouseButton {
  float x = 1;
  float y = 2;
  // 0=primary, 1=secondary, 2=middle, 3=extra1, 4=extra2 (matches
  // browser MouseEvent.button order and egui::PointerButton).
  uint32 button = 3;
  bool pressed = 4;
  uint32 modifiers = 5;
}

message MouseWheel {
  float dx = 1;
  float dy = 2;
  // 0=points (browser deltaMode PIXEL), 1=lines, 2=pages — matches
  // egui::MouseWheelUnit.
  uint32 unit = 3;
  uint32 modifiers = 4;
}

message KeyEvent {
  // Browser KeyboardEvent.key (also accepted spelled-out by
  // egui::Key::from_name: "ArrowDown", "Enter", "A", ...).
  string key = 1;
  // Browser KeyboardEvent.code ("KeyA", ...). Reserved for a future
  // layout-aware mapping; the v1 mapper uses `key`.
  string code = 2;
  bool pressed = 3;
  bool repeat = 4;
  uint32 modifiers = 5;
}

message TextInput {
  string text = 1;
}

// Pointer left the canvas (browser pointerleave) — clears hover state.
message PointerGone {
}

// Pinch gesture (touch clients): multiplicative zoom factor for this
// step, 1.0 = no change — maps to egui's Zoom event. Desktop pinch
// arrives as ctrl+wheel through MouseWheel instead and needs no event
// here (egui zooms on ctrl+scroll by itself).
message PinchZoom {
  float factor = 1;
}

message SessionControl {
  oneof control {
    SessionHello hello = 1;
    ViewportResize viewport_resize = 2;
    Ping ping = 3;
    SetCadence set_cadence = 4;
    DecodeCapabilities decode_capabilities = 5;
    // ADR-0086 active/passive roster:
    ClientHello client_hello = 6;   // client→server, post-connect
    Roster roster = 7;              // server→client, per recipient
    TakeSession take_session = 8;   // client→server
    // ADR-0082 SD6 clipboard (both ways):
    ClipboardData clipboard = 9;
  }
}

// Connection role in the session (ADR-0086 SD1). Server-authoritative:
// exactly one ACTIVE connection drives input + geometry; PASSIVE connections
// watch read-only. PASSIVE is the proto3 default (0) — the safe role.
enum Role {
  ROLE_PASSIVE = 0;
  ROLE_ACTIVE = 1;
}

// Client→server (ADR-0086 SD8/SD9): the viewer's capabilities and an optional
// device label, sent once just after connect. `webcodecs` gates takeover —
// only a decode-capable connection may become active (SD2). Geometry is not
// here: it continues to flow on ViewportResize (active-only).
message ClientHello {
  bool webcodecs = 1;
  string label = 2;
}

// One connection as seen in the roster (ADR-0086 SD9). Identity stays minimal:
// id, role, an optional label, and the takeover-capable (webcodecs) flag. Peer
// IP is used for rate-limiting/audit (ADR-0082) only and never appears here.
message RosterEntry {
  uint64 id = 1;
  Role role = 2;
  string label = 3;
  bool webcodecs = 4;
}

// Server→client (ADR-0086 SD1): the session roster, built PER RECIPIENT and
// rebroadcast on every membership/role change. `you_id`/`you_role` identify
// the receiving connection so its viewer can mirror its own role into the
// ViewMode and detect its own promotion/demotion — this folds the separate
// RoleChanged of SD8 into the roster.
message Roster {
  uint64 you_id = 1;
  Role you_role = 2;
  uint64 active_id = 3;   // 0 = no active connection (slot empty)
  uint32 count = 4;
  uint32 max = 5;
  repeated RosterEntry connections = 6;
}

// Client→server (ADR-0086 SD2): request to become the active connection.
// Honoured only from a webcodecs-capable connection; unilateral — it demotes
// the prior active to passive.
message TakeSession {
}

// Both ways (ADR-0082 SD6): clipboard text. Server→client carries text the
// host copied (drained from egui OutputCommand::CopyText) for the viewer to
// write to navigator.clipboard; client→server carries a paste the viewer read,
// which the host injects as egui::Event::Paste. Only the active session syncs.
message ClipboardData {
  string text = 1;
}

// Client→server: the viewer's decode capabilities (ADR-0088 SD2/SD8),
// probed against the current stream geometry. (Re)sent after the hello and
// after a resize, since smooth / power-efficient depend on resolution. The
// host forwards these to the Go interpreter, which offers the intersection
// of browser-can-decode and host-can-encode in the output control.
message DecodeCapabilities {
  repeated CodecCapability codecs = 1;
  // ADR-0128: the browser has a usable WebGL2 context — the mesh draw-stream
  // lane's decode requirement (it has no WebCodecs codec string to probe). Its
  // own value is geometry-independent, but it rides on this message because
  // build_video_caps already reads it; with it set the host offers codec id 4
  // (mesh) in the Go video-output control. Additive (field 2), per the
  // versioning policy above.
  bool webgl2 = 2;
}

// One probed WebCodecs configuration.
message CodecCapability {
  string codec = 1;          // WebCodecs codec string (avc1.* / vp09.* / av01.*)
  bool supported = 2;        // VideoDecoder.isConfigSupported
  bool smooth = 3;           // navigator.mediaCapabilities.decodingInfo
  bool power_efficient = 4;  // navigator.mediaCapabilities.decodingInfo
}

// Client→server: switch the host render cadence at runtime.
// 0 = continuous (fixed tick at the configured fps), 1 = reactive (pass
// only when egui schedules a repaint, with a 1 s idle heartbeat; frames
// identical to the previous one are never encoded in either mode).
// Scope is the host, not the session — it survives reconnects. Note:
// the Go side reads IMZERO2_RENDER_CADENCE at startup; full idle savings
// need the server launched reactive (otherwise the Go side keeps
// requesting per-frame repaints and reactive degrades to dedup-only).
message SetCadence {
  uint32 cadence = 1;
}

// Server→client: stream geometry the viewer needs to size its canvas and
// map pointer coordinates. Sent as the first message after connect AND
// re-announced whenever the host applies a viewport resize — geometry
// change implies a fresh encoder stream (SPS/PPS + IDR) follows, so the
// viewer drops its decoder and rejoins at the next key frame.
message SessionHello {
  uint32 width_px = 1;
  uint32 height_px = 2;
  float pixels_per_point = 3;
  // Current host cadence (0 = continuous, 1 = reactive) so the viewer's
  // toggle reflects truth at connect.
  uint32 cadence = 4;
  // WebCodecs codec string for VideoDecoder.configure (ADR-0088 SD6).
  // Empty for H.264 (the viewer derives avc1.* from the in-band SPS);
  // VP9/AV1 are named here (e.g. "vp09.00.41.08", "av01.0.08M.08"). A
  // codec switch re-announces the hello with the new string.
  string codec = 5;
}

// Client→server. ADR-0024 SD7/SD8 (amended at acceptance): the client's
// viewport in CSS pixels plus its pixel scale (devicePixelRatio × page
// zoom). The host clamps it, rebuilds the offscreen target and encoder
// at logical×scale physical pixels (rounded even), and answers with a
// fresh SessionHello.
message ViewportResize {
  float logical_width = 1;
  float logical_height = 2;
  float pixel_scale = 3;
}

message Ping {
  uint64 nonce = 1;
}

// Server→client video payload (prefix 0x01). One message per H.264
// access unit (ADR-0024 SD4); SPS/PPS ride in-band on every key frame
// (`dump_extra=freq=keyframe`).
message VideoChunk {
  uint64 frame_index = 1;
  // Microseconds since the encoder stream started; monotonic per
  // connection (each (re)connect restarts the stream at an IDR).
  uint64 timestamp_micros = 2;
  bool keyframe = 3;
  bytes data = 4;
}
