<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="10">
<title>Building…</title>
<style>
  html,body{height:100%;margin:0}
  body{display:grid;place-items:center;background:#0b0d12;color:#cdd6e4;
       font:16px/1.6 system-ui,-apple-system,sans-serif}
  .card{max-width:32rem;padding:2rem;text-align:center}
  h1{font-weight:600;font-size:1.4rem}
  .dot{display:inline-block;width:.55rem;height:.55rem;border-radius:50%;
       background:#5b8def;margin-left:.2rem;animation:p 1s infinite alternate}
  @keyframes p{to{opacity:.2}}
  p{color:#8a93a6}
</style>
</head>
<body>
  <div class="card">
    <h1>Build in progress <span class="dot"></span></h1>
    <p>A new release is being built and verified. This page refreshes automatically.</p>
  </div>
</body>
</html>
