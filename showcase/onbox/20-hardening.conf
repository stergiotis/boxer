# imzero2-demo.service hardening drop-in (ADR-0085) — systemd sandboxing for the
# exposed headless carrier. CANONICAL copy: the ansible provisioner installs it
# verbatim at /etc/systemd/system/imzero2-demo.service.d/20-hardening.conf, and
# `hmi_headless.sh --sandbox` parses the [Service] directives below to reproduce
# the same sandbox ad-hoc via systemd-run. Edit here only — the two must agree.
#
# FFFI2 (Go<->carrier IPC) is stdin/stdout pipes, untouched by these. What DOES
# interact: llvmpipe/lavapipe JIT (needs W^X) + ffmpeg — so there is deliberately
# NO MemoryDenyWriteExecute. If the stream will not start, suspect PrivateDevices
# or SystemCallFilter first; loosen and re-test.
[Service]
ProtectSystem=strict
ProtectHome=true
PrivateTmp=true
PrivateDevices=true
ProtectProc=invisible
ProcSubset=pid
CapabilityBoundingSet=
AmbientCapabilities=
NoNewPrivileges=true
RestrictSUIDSGID=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectKernelLogs=true
ProtectControlGroups=true
ProtectClock=true
ProtectHostname=true
RestrictRealtime=true
RestrictNamespaces=true
LockPersonality=true
RemoveIPC=true
UMask=0077
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6
IPAddressAllow=localhost
IPAddressDeny=any
SystemCallArchitectures=native
SystemCallFilter=@system-service
SystemCallErrorNumber=EPERM
