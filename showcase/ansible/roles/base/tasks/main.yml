---
# Host packages + firewall the deploy tool (and the headless carrier) assume.

- name: Install build + runtime packages
  ansible.builtin.package:
    name:
      # Build the 663-crate headless wgpu release + the cgo-free Go launcher.
      - git
      - curl
      - tar
      - gzip
      - gcc
      - gcc-c++
      - make
      - cmake
      - pkgconf-pkg-config
      - openssl-devel
      - fontconfig-devel
      - freetype-devel
      - perl-interpreter
      # Runtime: software Vulkan/GL (no GPU), fonts (run-current.sh fc-match's
      # 'Noto Sans' + 'Noto Sans CJK JP'), and the holding/serve path.
      - mesa-vulkan-drivers
      - mesa-dri-drivers
      - vulkan-loader
      - fontconfig
      - google-noto-sans-fonts
      - google-noto-sans-cjk-fonts
    state: present

# ffmpeg + optional hardware video encode. Three cases:
#   - neither flag: Fedora's ffmpeg-free (libopenh264 software encode).
#   - imzero2_install_rpmfusion_ffmpeg: full ffmpeg from RPM Fusion (adds libx264).
#   - imzero2_install_vaapi_freeworld: the freeworld Mesa VA-API driver so the
#     GPU's VCN/Quick Sync does H.264/HEVC/AV1 — imzero2 auto-selects it
#     (ADR-0088 CodecLane::best). Inert without a GPU; also pulls full ffmpeg.
# Either flag enables the RPM Fusion free repo + full ffmpeg (and its VA-API
# encoder wrappers); the freeworld flag adds the driver + vainfo on top.
- name: Install ffmpeg-free (Fedora libopenh264 build)
  ansible.builtin.package:
    name: ffmpeg-free
    state: present
  when: not (imzero2_install_rpmfusion_ffmpeg or imzero2_install_vaapi_freeworld)

- name: RPM Fusion media stack (full ffmpeg; optional freeworld VA-API driver)
  when: imzero2_install_rpmfusion_ffmpeg or imzero2_install_vaapi_freeworld
  block:
    - name: Enable RPM Fusion (free)
      ansible.builtin.command: >-
        dnf -y install
        https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm
      args:
        creates: /etc/yum.repos.d/rpmfusion-free.repo
    - name: Install the full ffmpeg (replaces ffmpeg-free; libx264 + VA-API encoder wrappers)
      ansible.builtin.command: dnf -y --allowerasing install ffmpeg
      register: _ff
      changed_when: "'Nothing to do' not in _ff.stdout"
    - name: Install the freeworld Mesa VA-API driver + vainfo (hardware H.264/HEVC/AV1 encode)
      ansible.builtin.command: dnf -y --allowerasing install mesa-va-drivers-freeworld libva-utils
      register: _va
      changed_when: "'Nothing to do' not in _va.stdout"
      when: imzero2_install_vaapi_freeworld

- name: Is firewalld active?
  ansible.builtin.command: systemctl is-active firewalld
  register: _firewalld
  changed_when: false
  failed_when: false

- name: Open 80/443 (Let's Encrypt challenge + TLS)
  when: imzero2_open_firewall and _firewalld.stdout == 'active'
  block:
    - name: Permit http/https in firewalld
      ansible.builtin.command: firewall-cmd --permanent --add-service={{ item }}
      register: _fw
      changed_when: "'ALREADY_ENABLED' not in (_fw.stdout ~ _fw.stderr)"
      failed_when: _fw.rc != 0 and 'ALREADY_ENABLED' not in (_fw.stdout ~ _fw.stderr)
      loop:
        - http
        - https
    - name: Reload firewalld
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true
