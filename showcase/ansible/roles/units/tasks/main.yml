---
# Install the ADR-0085 systemd units + polkit rule from onbox/, plus the Fedora
# glue the stock units lack:
#   - a PATH that finds cargo (rustup) + go for the systemd-DRIVEN build:
#     deploy.go build() runs with the unit's inherited env (nil env), and the
#     stock imzero2-deploy.service sets only HOME + CARGO_HOME.
#   - an libopenh264 encoder override (the units default to libx264, which
#     Fedora's ffmpeg does not ship) for the live demo AND the deploy gate.
# Also installs the ansible-pull self-convergence timer (host config only).

- name: Locate the onbox kit (shipped beside this playbook in the repo)
  ansible.builtin.set_fact:
    onbox_dir: "{{ playbook_dir }}/../onbox"

- name: Install run-current.sh
  ansible.builtin.copy:
    src: "{{ onbox_dir }}/run-current.sh"
    dest: "{{ imzero2_home }}/run-current.sh"
    owner: "{{ imzero2_user }}"
    group: "{{ imzero2_user }}"
    mode: "0755"

- name: Install the holding page
  ansible.builtin.copy:
    src: "{{ onbox_dir }}/building.html"
    dest: "{{ imzero2_home }}/holding/building.html"
    owner: "{{ imzero2_user }}"
    group: "{{ imzero2_user }}"
    mode: "0644"

- name: Install the systemd units
  ansible.builtin.copy:
    src: "{{ onbox_dir }}/{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - imzero2-demo.service
    - imzero2-deploy.service
    - imzero2-deploy.timer

- name: Install the polkit restart rule
  ansible.builtin.copy:
    src: "{{ onbox_dir }}/49-imzero2-deploy.rules"
    dest: /etc/polkit-1/rules.d/49-imzero2-deploy.rules
    mode: "0644"

- name: Ensure the drop-in directories
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}.d"
    state: directory
    mode: "0755"
  loop:
    - imzero2-deploy.service
    - imzero2-demo.service

- name: Drop-in — toolchain PATH + gate encoder + signing for the deploy oneshot
  ansible.builtin.copy:
    dest: /etc/systemd/system/imzero2-deploy.service.d/10-fedora.conf
    mode: "0644"
    content: |
      # Generated by the imzero2 ansible provisioner (Fedora 44).
      [Service]
      # build() inherits this unit's env; cargo (rustup) + go MUST be on PATH.
      Environment=PATH={{ imzero2_home }}/.cargo/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      Environment=RUSTUP_HOME={{ imzero2_home }}/.rustup
      # The gate reuses IMZERO2_HEADLESS_ENCODER_ARGS (cli.go gateEncoderDefault).
      Environment=IMZERO2_HEADLESS_ENCODER_ARGS={{ imzero2_encoder_args }}
      Environment=IMZERO2_DEPLOY_REQUIRE_SIGNED_TAGS={{ 'true' if imzero2_require_signed_tags else 'false' }}

- name: Drop-in — libopenh264 for the live demo (the unit defaults to libx264)
  ansible.builtin.copy:
    dest: /etc/systemd/system/imzero2-demo.service.d/10-fedora.conf
    mode: "0644"
    content: |
      # Generated by the imzero2 ansible provisioner (Fedora 44).
      [Service]
      Environment=IMZERO2_HEADLESS_ENCODER_ARGS={{ imzero2_encoder_args }}

- name: Hardening drop-in — demo (sandbox the exposed carrier)
  when: imzero2_systemd_hardening
  ansible.builtin.copy:
    dest: /etc/systemd/system/imzero2-demo.service.d/20-hardening.conf
    mode: "0644"
    content: |
      # Generated by the imzero2 ansible provisioner — systemd sandboxing.
      # FFFI2 (Go<->carrier IPC) is stdin/stdout pipes, untouched by these. What
      # DOES interact: llvmpipe/lavapipe JIT (needs W^X) + ffmpeg — so there is
      # deliberately NO MemoryDenyWriteExecute. If the stream will not start,
      # suspect PrivateDevices or SystemCallFilter first; loosen and re-test.
      [Service]
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true
      PrivateDevices=true
      ProtectProc=invisible
      ProcSubset=pid
      CapabilityBoundingSet=
      AmbientCapabilities=
      NoNewPrivileges=true
      RestrictSUIDSGID=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectKernelLogs=true
      ProtectControlGroups=true
      ProtectClock=true
      ProtectHostname=true
      RestrictRealtime=true
      RestrictNamespaces=true
      LockPersonality=true
      RemoveIPC=true
      UMask=0077
      RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6
      IPAddressAllow=localhost
      IPAddressDeny=any
      SystemCallArchitectures=native
      SystemCallFilter=@system-service
      SystemCallErrorNumber=EPERM

- name: Hardening drop-in — deploy oneshot (lighter; it builds + JITs the gate)
  when: imzero2_systemd_hardening
  ansible.builtin.copy:
    dest: /etc/systemd/system/imzero2-deploy.service.d/20-hardening.conf
    mode: "0644"
    content: |
      # Generated by the imzero2 ansible provisioner — systemd sandboxing.
      # Lighter than the demo: this oneshot BUILDS (cargo/go/cc/ld), needs the
      # network (git + crate/module fetch), and spawns the gate carrier (JIT).
      # So NO MemoryDenyWriteExecute, NO syscall allowlist, NO egress filter and
      # NO cap drop — those over a full toolchain are high-risk. Add after testing.
      [Service]
      ProtectSystem=strict
      ReadWritePaths={{ imzero2_home }}
      ProtectHome=true
      PrivateTmp=true
      ProtectKernelTunables=true
      ProtectKernelModules=true
      ProtectKernelLogs=true
      ProtectControlGroups=true
      ProtectClock=true
      ProtectHostname=true
      RestrictSUIDSGID=true
      RestrictRealtime=true
      RestrictNamespaces=true
      LockPersonality=true
      NoNewPrivileges=true
      SystemCallArchitectures=native

- name: Install the ansible-pull self-convergence units
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}"
    mode: "0644"
    content: "{{ item.content }}"
  loop:
    - name: imzero2-pull.service
      content: |
        [Unit]
        Description=Re-converge imzero2 host config from the playbook (ansible-pull)
        After=network-online.target
        Wants=network-online.target
        [Service]
        Type=oneshot
        ExecStart=/usr/bin/ansible-pull -U {{ imzero2_pull_url }} -C {{ imzero2_repo_branch }} -i localhost, -e @{{ imzero2_extra_vars_file }} {{ imzero2_pull_playbook }}
    - name: imzero2-pull.timer
      content: |
        [Unit]
        Description=Periodic imzero2 host re-convergence (ansible-pull)
        [Timer]
        OnBootSec=5min
        OnCalendar={{ imzero2_pull_oncalendar }}
        Persistent=true
        [Install]
        WantedBy=timers.target
  loop_control:
    label: "{{ item.name }}"

# --- optional: first-release bootstrap (long, cold build; off by default) ---
- name: Bootstrap the first release
  when: imzero2_bootstrap_first_release
  become: true
  become_user: "{{ imzero2_user }}"
  environment:
    HOME: "{{ imzero2_home }}"
    CARGO_HOME: "{{ imzero2_home }}/.cargo"
    RUSTUP_HOME: "{{ imzero2_home }}/.rustup"
    PATH: "{{ imzero2_home }}/.cargo/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    IMZERO2_HEADLESS_ENCODER_ARGS: "{{ imzero2_encoder_args }}"
  block:
    - name: Build the Go launcher (carries the deploy subcommand)
      ansible.builtin.command:
        cmd: ./build_go.sh
        chdir: "{{ imzero2_workspace }}/rust/imzero2"
        creates: "{{ imzero2_workspace }}/rust/imzero2/main_go"
    - name: Run the first deploy (fetch → build → gate → swap → restart)
      ansible.builtin.command:
        cmd: >-
          ./main_go --logFormat=console --logLevel=info imzero2 deploy
          --root {{ imzero2_home }}
          {{ '--require-signed-tags=false' if not imzero2_require_signed_tags else '' }}
          --encoder-args "{{ imzero2_encoder_args }}"
        chdir: "{{ imzero2_workspace }}/rust/imzero2"
        creates: "{{ imzero2_home }}/current"

# --- SELinux: the persistent half of the end-to-end story (Fedora enforcing) ---
# A service exec'ing a binary from /opt is denied if it is not bin_t. We install
# a persistent fcontext rule for the release tree + run-current.sh, so new
# release binaries INHERIT bin_t and `restorecon` re-applies it; the deploy tool
# restorecons each release as a backstop (deploy.go relabelSELinux). On by
# default — turn off only on a box with SELinux disabled.
- name: SELinux — label the exec paths bin_t
  when: imzero2_selinux_label_releases
  block:
    - name: Ensure semanage + restorecon
      ansible.builtin.package:
        name:
          - policycoreutils
          - policycoreutils-python-utils
        state: present
    - name: Add fcontext rules (release tree + run-current.sh)
      ansible.builtin.command: "semanage fcontext -a -t bin_t '{{ item }}'"
      register: _fc
      changed_when: _fc.rc == 0
      failed_when: _fc.rc != 0 and 'already defined' not in _fc.stderr
      loop:
        - "{{ imzero2_home }}/releases(/.*)?"
        - "{{ imzero2_home }}/run-current\\.sh"
    - name: Relabel the existing paths
      ansible.builtin.command: "restorecon -RF {{ item }}"
      changed_when: false
      loop:
        - "{{ imzero2_home }}/releases"
        - "{{ imzero2_home }}/run-current.sh"

# --- enable units; start only what is safe to start now ---
- name: Probe for an existing release
  ansible.builtin.stat:
    path: "{{ imzero2_home }}/current"
  register: _current

- name: Enable units (+ reload systemd)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    daemon_reload: true
  loop:
    - imzero2-demo.service
    - imzero2-deploy.timer
    - imzero2-pull.timer

- name: Start the ansible-pull host-convergence timer
  ansible.builtin.systemd:
    name: imzero2-pull.timer
    state: started

# The deploy timer's ExecStart is current/main_go, and the demo serves current/.
# Neither exists until the first release is bootstrapped — so start them only
# once `current` is present (re-running the playbook after the manual bootstrap
# picks this up automatically).
- name: Start the deploy timer + demo once a release exists
  when: _current.stat.exists
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  loop:
    - imzero2-deploy.timer
    - imzero2-demo.service
