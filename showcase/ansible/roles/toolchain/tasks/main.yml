---
# Go 1.26 (pinned upstream tarball) + rustup/Rust 1.92. Installed where the
# systemd-driven build can reach them: go on the system PATH, cargo via the
# deploy unit's PATH drop-in (units role). rustup honours rust/imzero2/
# rust-toolchain on first cargo, so the channel here just primes the cache.

- name: Map kernel arch → Go arch
  ansible.builtin.set_fact:
    go_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_facts['architecture']] }}"

- name: Query installed Go
  ansible.builtin.command: /usr/local/go/bin/go version
  register: _go
  changed_when: false
  failed_when: false

- name: Install Go {{ go_version }}
  when: ('go' ~ go_version) not in _go.stdout
  vars:
    _go_tarball: "go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
  block:
    # The go.dev .sha256 sidecar no longer serves a bare hash (it redirects to an
    # HTML page), so get_url's checksum:URL can't parse it. Read the authoritative
    # SHA256 from the release index JSON instead.
    - name: Fetch the go.dev release index (authoritative SHA256s)
      ansible.builtin.uri:
        url: "https://go.dev/dl/?mode=json&include=all"
        return_content: true
      register: _go_index

    - name: Resolve this tarball's SHA256 from the index
      ansible.builtin.set_fact:
        _go_sha256: "{{ ((_go_index.content | from_json) | selectattr('version', 'equalto', 'go' ~ go_version) | map(attribute='files') | flatten | selectattr('filename', 'equalto', _go_tarball) | map(attribute='sha256') | first | default('')) }}"

    - name: Fail clearly if the index has no checksum for this version/arch
      ansible.builtin.assert:
        that: _go_sha256 | length == 64
        fail_msg: "No SHA256 for {{ _go_tarball }} in the go.dev index — check go_version ({{ go_version }})."

    - name: Download + verify the Go tarball
      ansible.builtin.get_url:
        url: "https://go.dev/dl/{{ _go_tarball }}"
        dest: "/tmp/{{ _go_tarball }}"
        checksum: "sha256:{{ _go_sha256 }}"
        mode: "0644"

    - name: Remove any previous Go
      ansible.builtin.file:
        path: /usr/local/go
        state: absent
    - name: Unpack Go into /usr/local
      ansible.builtin.unarchive:
        src: "/tmp/{{ _go_tarball }}"
        dest: /usr/local
        remote_src: true

- name: Expose go/gofmt on the system PATH (systemd's default PATH finds these)
  ansible.builtin.file:
    src: "/usr/local/go/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - go
    - gofmt

- name: Install rustup + Rust {{ rust_version }} (as {{ imzero2_user }})
  become: true
  become_user: "{{ imzero2_user }}"
  ansible.builtin.shell: >-
    set -o pipefail;
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs |
    sh -s -- -y --no-modify-path --profile minimal
    --default-toolchain {{ rust_version }} -c rustfmt -c clippy
  args:
    creates: "{{ imzero2_home }}/.cargo/bin/rustup"
    executable: /bin/bash
  environment:
    RUSTUP_HOME: "{{ imzero2_home }}/.rustup"
    CARGO_HOME: "{{ imzero2_home }}/.cargo"
