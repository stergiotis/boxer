---
# Defaults for the imzero2 on-box-deploy provisioner. Non-secret, repo-committed.
# Site-specific values and secrets (domain, basic-auth hash, trusted signers)
# belong in a root-only file the pull loop reads via `-e @<file>` — see
# `imzero2_extra_vars_file` and README.md. CLI `-e` overrides anything here.

# --- identity / paths (match onbox/ONBOX.md) ---
imzero2_user: imzero2
imzero2_home: /opt/imzero2
imzero2_workspace: "{{ imzero2_home }}/workspace"

# --- source (read-only; the box never holds push creds) ---
imzero2_repo_url: "https://github.com/stergiotis/boxer.git"
imzero2_repo_branch: main

# --- toolchain pins ---
# go_version is the patch to install; it only needs to be >= go.mod's floor
# (go 1.26.0). Bump freely — the tarball is checksum-verified from go.dev's
# sidecar, so any real version string just works. rust_version matches
# rust/imzero2/rust-toolchain.
go_version: "1.26.4"
rust_version: "1.92"

# --- H.264 encoder ---
# Fedora's ffmpeg ships libopenh264, NOT libx264 (GPL). This overrides the
# units' hardcoded x264 for BOTH the live demo and the deploy gate. demo.env
# .example calls this the "ADR-verified frame-stable path". Set
# imzero2_install_rpmfusion_ffmpeg=true to get x264 from RPM Fusion instead.
imzero2_encoder_args: "-c:v libopenh264 -b:v 4M -bf 0 -g 60"
imzero2_install_rpmfusion_ffmpeg: false

# --- hardware video encode (GPU boxes only) ---
# Install RPM Fusion's freeworld Mesa VA-API driver (+ vainfo) so the GPU's
# VCN/Quick Sync does H.264/HEVC/AV1 in hardware — imzero2 headless then
# auto-selects it (ADR-0088 CodecLane::best probes VAAPI, else software). Also
# pulls the full ffmpeg (for its VA-API encoder wrappers). On the demo unit it
# also clears IMZERO2_HEADLESS_ENCODER_ARGS (so best() auto-selects HW instead
# of the software pin) and, when imzero2_systemd_hardening is on, exposes the
# GPU render node (PrivateDevices=false + DeviceAllow=char-drm). INERT without a
# GPU: a no-GPU cloud box (e.g. Hetzner cpx32) has no render node, so best()
# falls back to libopenh264 regardless — leave this off there. Recipe:
# doc/howto/amd-hardware-video-encoding.md.
imzero2_install_vaapi_freeworld: false

# --- deploy security (SD8) ---
# With signed tags required (default, correct for an exposed box) you MUST list
# the release signer(s) in imzero2_allowed_signers, else the deploy refuses to
# build. Format: ["release@you ssh-ed25519 AAAA...", ...]. Set require=false
# only on a trusted/loopback box.
imzero2_require_signed_tags: true
imzero2_allowed_signers: []

# --- Caddy / exposure (set the secret bits in the extra-vars file) ---
imzero2_caddy_install: copr        # copr | skip  (skip = you install caddy yourself)
imzero2_domain: ""                 # e.g. demo.example.com or <box-ip>.nip.io  (REQUIRED to serve)
imzero2_basic_auth_user: "demo"
imzero2_basic_auth_hash: ""        # caddy hash-password --plaintext '...'
imzero2_open_firewall: true

# --- ansible-pull self-convergence (host config only; the app self-updates via
#     the deploy timer — two separate loops, see README) ---
imzero2_pull_url: "{{ imzero2_repo_url }}"
imzero2_pull_playbook: "showcase/ansible/site.yml"
imzero2_pull_oncalendar: "daily"
imzero2_extra_vars_file: /etc/imzero2/provision.yml

# --- systemd sandboxing (drop-ins; see README "Hardening") ---
# Adds ProtectSystem=strict + the Protect*/Restrict* knobs to both units. The
# demo also gets PrivateDevices + a syscall allowlist + loopback-only egress.
# Verify the stream + a cold build survive before trusting it on; flip off fast
# if something breaks. NB: MemoryDenyWriteExecute is never set (llvmpipe JIT).
imzero2_systemd_hardening: true

# --- SELinux (Fedora is enforcing) ---
# Install the persistent fcontext rule (release tree + run-current.sh -> bin_t)
# so new release binaries inherit an exec-able label and `restorecon` re-applies
# it. The deploy tool also restorecons each release as a backstop. Together this
# is the end-to-end SELinux story; leave on for a Fedora box.
imzero2_selinux_label_releases: true

# --- optional ---
imzero2_bootstrap_first_release: false  # run the (long, cold) first build inside the play

# --- optional ClickHouse (off by default; see roles/clickhouse) ---
# clickhouse-local is the /usr/bin/clickhouse-local binary the demo spawns per
# query (ADR-0028) for regex_explorer + `--launch` resolution. The server is a
# loopback-only daemon (default user, empty password) for the HTTP-endpoint path
# (CLICKHOUSE_ENDPOINT / CLICKHOUSE_URL) — nothing in the stock demo dials it yet.
# Flip either on in the root-only extra-vars file (imzero2_extra_vars_file).
imzero2_install_clickhouse_local: false
imzero2_install_clickhouse_server: false
imzero2_clickhouse_max_memory_bytes: 2147483648   # 2 GiB server cap; bump on a bigger box
imzero2_clickhouse_rpm_baseurl: "https://packages.clickhouse.com/rpm/stable/"
imzero2_clickhouse_rpm_gpgkey: "https://packages.clickhouse.com/CLICKHOUSE-KEY.GPG"
