name: Run all tests

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  gotest:
    name: gotest
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
      - name: Setup
        run: ./scripts/ci/install.sh
      - name: Check go.mod/go.sum are tidy
        run: go mod tidy --diff
      - name: Verify module checksums
        run: go mod verify
      - name: Run Tests
        run: ./scripts/ci/gotest.sh
      # Generator tests regenerate *.out.* files in place; a dirty tree here
      # means the committed generated code has drifted from its generators.
      - name: Check generated code is drift-free
        run: |
          status="$(git status --porcelain)"
          if [ -n "$status" ]; then
            echo "$status"
            git diff
            echo "::error::The test run left the tree dirty — committed generated code drifted from its generators (or a test wrote into the tree). Regenerate locally and commit the result."
            exit 1
          fi

  gotest-binary-log:
    name: gotest (binary_log)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
      - name: Setup
        run: ./scripts/ci/install.sh
      - name: Run binary_log Tests
        run: ./scripts/ci/gotest_binary_log.sh
      - name: Check generated code is drift-free
        run: |
          status="$(git status --porcelain)"
          if [ -n "$status" ]; then
            echo "$status"
            git diff
            echo "::error::The test run left the tree dirty — committed generated code drifted from its generators (or a test wrote into the tree). Regenerate locally and commit the result."
            exit 1
          fi
