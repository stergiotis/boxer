name: code statistics
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 6am UTC

permissions:
  contents: read
  # contents: write # needed for README auto-update

jobs:
  codestat:
    name: codestat
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history for authorship analysis
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
      - name: Code statistics (all)
        run: go tool scc --not-match '(\.gen\.|\.out\.|golay24)' --sort code --wide .
      # Human-vs-LLM attribution comes from git Co-Authored-By trailers via the
      # "Code authorship" step below, not build tags — the llm_generated_* tags
      # were retired (ADR-0083).
      - name: Dependency count
        run: |
          echo "Direct dependencies:"
          go list -m -f '{{if not .Indirect}}  {{.Path}} {{.Version}}{{end}}' all
          echo ""
          echo "Total modules: $(go list -m all | wc -l)"
      - name: Code authorship (human vs LLM)
        run: ./boxer.sh gov repo authorship --repo .
      - name: Job summary
        run: |
          {
            echo '## Code Statistics'
            echo ''
            echo '### All Code'
            echo '```'
            go tool scc --not-match '(\.gen\.|\.out\.|golay24)' --sort code --wide .
            echo '```'
            echo ''
            echo '### Code Authorship Over Time'
            echo '```'
            ./boxer.sh gov repo authorship --repo .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
