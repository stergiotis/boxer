name: code statistics
on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 6am UTC

permissions:
  contents: read
  # contents: write # needed for README auto-update

jobs:
  codestat:
    name: codestat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for authorship analysis
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
      - name: Code statistics (all)
        run: go tool scc --not-match '(\.gen\.|\.out\.|golay24)' --sort code --wide .
      - name: Code statistics (human written)
        run: grep -rL '//go:build llm_generated' --include='*.go' . | grep -vE '\.(gen|out)\.|golay24' | xargs go tool scc --sort code --wide
      - name: Code statistics (LLM generated)
        run: grep -rl '//go:build llm_generated' --include='*.go' . | grep -vE '\.(gen|out)\.|golay24' | xargs go tool scc --sort code --wide
      - name: Dependency count
        run: |
          echo "Direct dependencies:"
          go list -m -f '{{if not .Indirect}}  {{.Path}} {{.Version}}{{end}}' all
          echo ""
          echo "Total modules: $(go list -m all | wc -l)"
      - name: Code authorship (human vs LLM)
        run: go run -tags llm_generated_opus46 ./public/app/ gov repo authorship --repo .
      - name: Job summary
        run: |
          {
            echo '## Code Statistics'
            echo ''
            echo '### All Code'
            echo '```'
            go tool scc --not-match '(\.gen\.|\.out\.|golay24)' --sort code --wide .
            echo '```'
            echo ''
            echo '### Human Written'
            echo '```'
            grep -rL '//go:build llm_generated' --include='*.go' . | grep -vE '\.(gen|out)\.|golay24' | xargs go tool scc --sort code --wide
            echo '```'
            echo ''
            echo '### LLM Generated'
            echo '```'
            grep -rl '//go:build llm_generated' --include='*.go' . | grep -vE '\.(gen|out)\.|golay24' | xargs go tool scc --sort code --wide || echo '(none)'
            echo '```'
            echo ''
            echo '### Code Authorship Over Time'
            echo '```'
            go run -tags llm_generated_opus46 ./public/app/ gov repo authorship --repo .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
