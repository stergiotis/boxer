name: code statistics
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  codestat:
    name: codestat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
      - name: Code statistics (all)
        run: go tool github.com/boyter/scc/v3 --not-match '(\.gen\.|\.out\.|golay24)' --sort code --wide .
      - name: Code statistics (human written)
        run: grep -rL '//go:build llm_generated' --include='*.go' . | xargs go tool github.com/boyter/scc/v3 --sort code --wide
      - name: Code statistics (LLM generated)
        run: grep -rl '//go:build llm_generated' --include='*.go' . | xargs go tool github.com/boyter/scc/v3 --sort code --wide
      - name: Dependency count
        run: |
          echo "Direct dependencies:"
          go list -m -f '{{if not .Indirect}}  {{.Path}} {{.Version}}{{end}}' all
          echo ""
          echo "Total modules: $(go list -m all | wc -l)"
